      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Memory Service - Java + Spring Boot + H2
  # ---------------------------------------------------------------------------
  hc-memory-service:
    container_name: hc-memory-service
    build:
      context: ./services/memory-service
      dockerfile: Dockerfile
    image: humancare/memory:latest
    environment:
      SERVER_PORT: 8086
      SPRING_APPLICATION_NAME: memory-service
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config:config123@hc-config-server:8888"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://hc-eureka-server:8761/eureka/
      JAVA_OPTS: >
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8086:8086"
    volumes:
      - hc_memory_data:/data
    depends_on:
      hc-eureka-server:
        condition: service_healthy
      hc-config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Community Service - Java + Spring Boot + MySQL
  # ---------------------------------------------------------------------------
  hc-community-service:
    container_name: hc-community-service
    build:
      context: ./services/community-service
      dockerfile: Dockerfile
    image: humancare/community:latest
    environment:
      SERVER_PORT: 8087
      SPRING_APPLICATION_NAME: community-service
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config:config123@hc-config-server:8888"
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://hc-eureka-server:8761/eureka/
      SPRING_RABBITMQ_HOST: hc-rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: humancare
      SPRING_RABBITMQ_PASSWORD: humancare123
      JAVA_OPTS: >
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8087:8087"
    depends_on:
      hc-mysql-community:
        condition: service_healthy
      hc-eureka-server:
        condition: service_healthy
      hc-config-server:
        condition: service_healthy
      hc-rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Daily Check-in Service - Java + Spring Boot + H2
  # ---------------------------------------------------------------------------
  hc-daily-checkin-service:
    container_name: hc-daily-checkin-service
    build:
      context: ./services/daily-checkin-service
      dockerfile: Dockerfile
    image: humancare/daily-checkin:latest
    environment:
      SERVER_PORT: 8084
      SPRING_APPLICATION_NAME: daily-checkin-service
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config:config123@hc-config-server:8888"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://hc-eureka-server:8761/eureka/
      JAVA_OPTS: >
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8084:8084"
    volumes:
      - hc_checkin_data:/data
    depends_on:
      hc-eureka-server:
        condition: service_healthy
      hc-config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ---------------------------------------------------------------------------
  # API Gateway - Spring Cloud Gateway (DIFFERENT PORT: 8081)
  # ---------------------------------------------------------------------------
  hc-api-gateway:
    container_name: hc-api-gateway
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    image: humancare/gateway:latest
    environment:
      SERVER_PORT: 8080     # Internal port (inside container)
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://hc-eureka-server:8761/eureka/
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://hc-keycloak:8080/realms/humancare
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://hc-keycloak:8080/realms/humancare/protocol/openid-connect/certs
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config:config123@hc-config-server:8888"
      JAVA_OPTS: >
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8081:8080"        # ← CHANGED from 8080 to 8081 (external access)
    depends_on:
      hc-eureka-server:
        condition: service_healthy
      hc-config-server:
        condition: service_healthy
      hc-keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Prometheus - Metrics Collection
  # ---------------------------------------------------------------------------
  hc-prometheus:
    container_name: hc-prometheus
    image: prom/prometheus:v2.50.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - hc_prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ---------------------------------------------------------------------------
  # Grafana - Metrics Visualization
  # ---------------------------------------------------------------------------
  hc-grafana:
    container_name: hc-grafana
    image: grafana/grafana:10.3.1
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - hc_grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - hc-prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

# -----------------------------------------------------------------------------
# Named Volumes (prefixed with hc_)
# -----------------------------------------------------------------------------
volumes:
  hc_mongo_notification:
    driver: local
  hc_pg_patient:
    driver: local
  hc_pg_keycloak:
    driver: local
  hc_pg_safety:
    driver: local
  hc_mysql_appointments:
    driver: local
  hc_mysql_medication:
    driver: local
  hc_routine_data:
    driver: local

  hc_mysql_community:
    driver: local
  hc_rabbitmq_data:
    driver: local
  hc_checkin_data:
    driver: local
  hc_memory_data:
    driver: local
  hc_prometheus_data:
    driver: local
  hc_grafana_data:
    driver: local

