<h2 mat-dialog-title>
  <mat-icon>add_circle</mat-icon>
  Daily Check-in
</h2>

<form [formGroup]="checkinForm" (ngSubmit)="onSubmit()">
  <mat-dialog-content>
    <div class="form-container">
      <!-- Check-in Date -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Check-in Date</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="checkinDate" placeholder="Choose a date">
        <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
        <mat-error *ngIf="checkinForm.get('checkinDate')?.hasError('required')">
          Date is required
        </mat-error>
      </mat-form-field>

      <!-- Mood -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Mood</mat-label>
        <mat-select formControlName="mood">
          <mat-option *ngFor="let mood of moodOptions" [value]="mood">
            {{ mood }}
          </mat-option>
        </mat-select>
        <mat-icon matPrefix>mood</mat-icon>
        <mat-error *ngIf="checkinForm.get('mood')?.hasError('required')">
          Mood is required
        </mat-error>
      </mat-form-field>

      <!-- Energy Level -->
      <div class="slider-field full-width">
        <label class="slider-label">
          <mat-icon>bolt</mat-icon>
          Energy Level: {{ checkinForm.get('energyLevel')?.value }}/10
        </label>
        <mat-slider min="1" max="10" step="1" showTickMarks discrete>
          <input matSliderThumb formControlName="energyLevel">
        </mat-slider>
      </div>

      <!-- Sleep Quality -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Sleep Quality</mat-label>
        <mat-select formControlName="sleepQuality">
          <mat-option *ngFor="let quality of sleepOptions" [value]="quality">
            {{ quality }}
          </mat-option>
        </mat-select>
        <mat-icon matPrefix>hotel</mat-icon>
        <mat-error *ngIf="checkinForm.get('sleepQuality')?.hasError('required')">
          Sleep quality is required
        </mat-error>
      </mat-form-field>

      <!-- Notes -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Notes (Optional)</mat-label>
        <textarea
          matInput
          formControlName="notes"
          rows="3"
          placeholder="How are you feeling? Any additional notes?"
        ></textarea>
        <mat-icon matPrefix>notes</mat-icon>
      </mat-form-field>

      <!-- Symptoms Section -->
      <div class="symptoms-section">
        <div class="symptoms-header">
          <h3><mat-icon>healing</mat-icon> Symptoms</h3>
          <button
            type="button"
            mat-stroked-button
            color="primary"
            (click)="addSymptom()"
          >
            <mat-icon>add</mat-icon>
            Add Symptom
          </button>
        </div>

        <div *ngIf="symptoms.length === 0" class="no-symptoms">
          No symptoms recorded.
        </div>

        <div formArrayName="symptoms" class="symptoms-list">
          <div
            *ngFor="let symptom of symptoms.controls; let i = index"
            [formGroupName]="i"
            class="symptom-item"
          >
            <div class="symptom-fields">
              <mat-form-field appearance="outline" class="symptom-type">
                <mat-label>Symptom</mat-label>
                <input matInput formControlName="symptomType" placeholder="e.g. Headache">
                <mat-error *ngIf="symptom.get('symptomType')?.hasError('required')">
                  Required
                </mat-error>
              </mat-form-field>

              <div class="slider-field symptom-severity">
                <label class="slider-label">Severity: {{ symptom.get('severity')?.value }}/10</label>
                <mat-slider min="1" max="10" step="1" showTickMarks discrete>
                  <input matSliderThumb formControlName="severity">
                </mat-slider>
              </div>

              <mat-form-field appearance="outline" class="symptom-notes">
                <mat-label>Notes</mat-label>
                <input matInput formControlName="notes" placeholder="Optional">
              </mat-form-field>
            </div>

            <button
              type="button"
              mat-icon-button
              color="warn"
              (click)="removeSymptom(i)"
              matTooltip="Remove symptom"
            >
              <mat-icon>remove_circle</mat-icon>
            </button>
          </div>
        </div>
      </div>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="onCancel()" [disabled]="loading">
      Cancel
    </button>
    <button
      mat-raised-button
      color="primary"
      type="submit"
      [disabled]="checkinForm.invalid || loading"
    >
      <mat-spinner *ngIf="loading" diameter="20" class="button-spinner"></mat-spinner>
      <mat-icon *ngIf="!loading">save</mat-icon>
      Save Check-in
    </button>
  </mat-dialog-actions>
</form>
