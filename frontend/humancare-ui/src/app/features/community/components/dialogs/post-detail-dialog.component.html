<div class="detail-dialog">
  <div class="dialog-header">
    <div class="category-badge" [class]="'cat-' + data.post.category.toLowerCase()">
      {{ data.post.category }}
    </div>
    <div class="status-badge" [class.active]="data.post.isActive">
      {{ data.post.isActive ? 'Active' : 'Inactive' }}
    </div>
  </div>

  <h2 mat-dialog-title class="post-title">{{ data.post.title }}</h2>

  <mat-dialog-content>
    <div class="post-meta-row">
      <span class="meta-item">
        <mat-icon>schedule</mat-icon>
        Posted: {{ formatDate(data.post.createdAt) }}
      </span>
      <span class="meta-item">
        <mat-icon>update</mat-icon>
        Updated: {{ formatDate(data.post.updatedAt) }}
      </span>
    </div>

    <div class="post-body">
      <p>{{ data.post.content }}</p>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-raised-button class="close-btn" mat-dialog-close>
      <mat-icon>close</mat-icon>
      Close
    </button>
  </mat-dialog-actions>
</div>
