<div class="detail-dialog">
  <div class="dialog-header">
    <mat-chip
      [color]="data.post.category === 'EVENT' ? 'accent' : 'primary'"
      selected
      class="category-chip"
    >
      {{ data.post.category }}
    </mat-chip>
    <mat-chip
      [color]="data.post.isActive ? 'primary' : 'warn'"
      selected
      class="status-chip"
    >
      {{ data.post.isActive ? 'Active' : 'Inactive' }}
    </mat-chip>
  </div>

  <h2 mat-dialog-title class="post-title">{{ data.post.title }}</h2>

  <mat-dialog-content>
    <div class="post-meta-row">
      <span class="meta-item">
        <mat-icon>schedule</mat-icon>
        Posted: {{ formatDate(data.post.createdAt) }}
      </span>
      <span class="meta-item">
        <mat-icon>update</mat-icon>
        Updated: {{ formatDate(data.post.updatedAt) }}
      </span>
    </div>

    <div class="post-body">
      <p>{{ data.post.content }}</p>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button mat-dialog-close color="primary">
      <mat-icon>close</mat-icon>
      Close
    </button>
  </mat-dialog-actions>
</div>
