<h2 mat-dialog-title>
  <mat-icon color="primary">assignment_ind</mat-icon>
  Confirm Assignment
</h2>

<mat-dialog-content>
  <p class="dialog-description">
    Are you sure you want to assign this patient?
  </p>
  
  <div class="assignment-details">
    <div class="detail-row">
      <span class="label">Patient:</span>
      <span class="value">{{ data.patientName }}</span>
    </div>
    <div class="detail-row">
      <span class="label">{{ getAssignmentType() }}:</span>
      <span class="value">{{ data.assigneeName }}</span>
    </div>
  </div>

  <div class="warning-text" *ngIf="data.type === 'doctor'">
    <mat-icon>info</mat-icon>
    <span>This will make you the primary doctor responsible for this patient's care.</span>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onConfirm()">
    <mat-icon>check</mat-icon>
    Confirm Assignment
  </button>
</mat-dialog-actions>
