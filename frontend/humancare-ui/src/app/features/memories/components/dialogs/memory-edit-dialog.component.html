<h2 mat-dialog-title>
  <mat-icon>edit</mat-icon>
  Edit Memory
</h2>

<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <mat-dialog-content>
    <div class="form-container">
      <!-- Title -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Title</mat-label>
        <input matInput formControlName="title" placeholder="Memory title">
        <mat-icon matPrefix>title</mat-icon>
        <mat-error *ngIf="form.get('title')?.hasError('required')">
          Title is required
        </mat-error>
        <mat-error *ngIf="form.get('title')?.hasError('maxlength')">
          Title must not exceed 200 characters
        </mat-error>
      </mat-form-field>

      <!-- Description -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Description</mat-label>
        <textarea matInput formControlName="description" rows="4" placeholder="Describe this memory"></textarea>
        <mat-icon matPrefix>description</mat-icon>
        <mat-error *ngIf="form.get('description')?.hasError('maxlength')">
          Description must not exceed 2000 characters
        </mat-error>
      </mat-form-field>

      <!-- Memory Date -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Memory Date</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="memoryDate" placeholder="Choose a date">
        <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
        <mat-icon matPrefix>event</mat-icon>
      </mat-form-field>

      <!-- Memory Type -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Memory Type</mat-label>
        <mat-select formControlName="memoryType">
          <mat-option *ngFor="let type of memoryTypes" [value]="type">
            {{ type | titlecase }}
          </mat-option>
        </mat-select>
        <mat-icon matPrefix>category</mat-icon>
        <mat-error *ngIf="form.get('memoryType')?.hasError('required')">
          Memory type is required
        </mat-error>
      </mat-form-field>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="onCancel()">Cancel</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || form.pending">
      <mat-icon>save</mat-icon>
      Update Memory
    </button>
  </mat-dialog-actions>
</form>
