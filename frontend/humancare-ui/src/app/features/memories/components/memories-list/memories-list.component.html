<div class="memories-list-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Memories</mat-card-title>
      <mat-card-subtitle>Manage patient memories</mat-card-subtitle>
      <span class="spacer"></span>
      <button mat-raised-button color="primary" (click)="openCreateDialog()">
        <mat-icon>add</mat-icon>
        Add Memory
      </button>
    </mat-card-header>

    <mat-card-content>
      <div *ngIf="loading" class="loading-container">
        <mat-spinner diameter="48"></mat-spinner>
        <p>Loading memories...</p>
      </div>

      <div *ngIf="!loading">
        <table mat-table [dataSource]="memories" class="memories-table">
          <!-- Title Column -->
          <ng-container matColumnDef="title">
            <th mat-header-cell *matHeaderCellDef>Title</th>
            <td mat-cell *matCellDef="let memory">{{ memory.title }}</td>
          </ng-container>

          <!-- Patient ID Column -->
          <ng-container matColumnDef="patientId">
            <th mat-header-cell *matHeaderCellDef>Patient ID</th>
            <td mat-cell *matCellDef="let memory">{{ memory.patientId }}</td>
          </ng-container>

          <!-- Type Column -->
          <ng-container matColumnDef="memoryType">
            <th mat-header-cell *matHeaderCellDef>Type</th>
            <td mat-cell *matCellDef="let memory">
              <mat-icon class="type-icon">{{ getTypeIcon(memory.memoryType) }}</mat-icon>
              {{ memory.memoryType }}
            </td>
          </ng-container>

          <!-- Memory Date Column -->
          <ng-container matColumnDef="memoryDate">
            <th mat-header-cell *matHeaderCellDef>Memory Date</th>
            <td mat-cell *matCellDef="let memory">{{ formatDate(memory.memoryDate) }}</td>
          </ng-container>

          <!-- Actions Column -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let memory">
              <button mat-icon-button color="primary" (click)="openDetailDialog(memory)" matTooltip="View">
                <mat-icon>visibility</mat-icon>
              </button>
              <button
                *ngIf="canDelete(memory)"
                mat-icon-button
                color="warn"
                (click)="deleteMemory(memory)"
                matTooltip="Delete">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <div *ngIf="memories.length === 0" class="no-data">
          <mat-icon>photo_library</mat-icon>
          <p>No memories found</p>
        </div>

        <mat-paginator
          [length]="totalElements"
          [pageSize]="size"
          [pageIndex]="page"
          [pageSizeOptions]="[10, 20, 50]"
          (page)="onPageChange($event)"
          showFirstLastButtons>
        </mat-paginator>
      </div>
    </mat-card-content>
  </mat-card>
</div>
