<div class="sidebar-container">
  <div class="sidebar-header">
    <div class="logo-section" *ngIf="currentUser$ | async as user">
      <div class="logo-avatar">{{ getInitials(user) }}</div>
      <div class="logo-text">
        <span class="user-name">{{ user.firstName }}</span>
        <span class="user-role">{{ getPrimaryRole(user) }}</span>
      </div>
    </div>
  </div>
  
  <mat-divider></mat-divider>
  
  <nav class="sidebar-nav">
    <mat-nav-list>
      <ng-container *ngFor="let item of menuItems$ | async; let last = last">
        <a 
          mat-list-item 
          [routerLink]="item.route"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
          class="nav-item">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
        <mat-divider *ngIf="isDividerNeeded(item, last)"></mat-divider>
      </ng-container>
    </mat-nav-list>
  </nav>
  
  <div class="sidebar-footer">
    <mat-divider></mat-divider>
    <div class="app-version">
      <span>HumanCare v1.0.0</span>
    </div>
  </div>
</div>
