spring:
  datasource:
    url: jdbc:h2:file:/data/checkin_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8090/realms/humancare
          jwk-set-uri: http://localhost:8090/realms/humancare/protocol/openid-connect/certs

server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: http://hc-eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true
    hostname: hc-daily-checkin-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:h2:file:/data/checkin_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
  h2:
    console:
      settings:
        web-allow-others: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://hc-keycloak:8080/realms/humancare
          jwk-set-uri: http://hc-keycloak:8080/realms/humancare/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      defaultZone: http://hc-eureka-server:8761/eureka/
