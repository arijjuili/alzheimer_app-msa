# Default configuration for all services

server:
  servlet:
    context-path: /

# Common Spring Boot settings
spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# Common management settings
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# RabbitMQ defaults
spring:
  rabbitmq:
    host: localhost
    port: 5672
    username: humancare
    password: humancare123

# Common logging
logging:
  level:
    root: INFO
    com.humancare: DEBUG
    org.springframework.cloud: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
