# API Gateway Configuration

spring:
  cloud:
    gateway:
      # Global CORS configuration
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://134.122.73.7"
              - "http://134.122.73.7:4200"
              - "http://134.122.73.7:4201"
              - "http://127.0.0.1:4200"
              - "http://127.0.0.1:4201"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600

      # Route definitions using lb:// for Eureka service discovery
      routes:
        # Patient Service (Node.js + Express)
        - id: patient-service
          uri: lb://patient-service
          predicates:
            - Path=/api/v1/patients,/api/v1/patients/**,/api/v1/audit,/api/v1/audit/**,/api/v1/doctors,/api/v1/doctors/**,/api/v1/caregivers,/api/v1/caregivers/**,/auth/**
          filters:
            - StripPrefix=0
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE

        # Event Ingestion Service (placeholder)
        - id: event-ingestion
          uri: lb://event-ingestion
          predicates:
            - Path=/api/v1/events/**, /api/v1/devices/**
          filters:
            - StripPrefix=0

        # Safety Alert Engine
        - id: safety-alert-engine
          uri: lb://safety-alert-engine
          predicates:
            - Path=/api/behavior-logs/**, /api/alerts/**
          filters:
            - StripPrefix=0

        # Notification Service
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**,/api/notification-templates/**,/api/schedules/**
          filters:
            - StripPrefix=0
            - TokenRelay
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE

        # Cognitive Memory Service (placeholder)
        - id: cognitive-memory
          uri: lb://cognitive-memory
          predicates:
            - Path=/api/v1/cognitive/**, /api/v1/games/**, /api/v1/memories/**
          filters:
            - StripPrefix=0

        # Daily Care Service (placeholder)
        - id: daily-care
          uri: lb://daily-care
          predicates:
            - Path=/api/v1/daily-care/**, /api/v1/habits/**
          filters:
            - StripPrefix=0

        # Appointments Service (Java + Eureka)
        - id: appointments-service
          uri: lb://appointments-service
          predicates:
            - Path=/api/appointments/**
          filters:
            - StripPrefix=0
            - TokenRelay
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE

        # Medication Service (Java + Eureka)
        - id: medication-service
          uri: lb://medication-service
          predicates:
            - Path=/api/medications/**
          filters:
            - StripPrefix=0
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE

        # Routine Service (Java + Eureka)
        - id: routine-service
          uri: lb://routine-service
          predicates:
            - Path=/api/routines/**,/api/v1/routines/**
          filters:
            - StripPrefix=0
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE

        # Community Service (Java + Eureka)
        - id: community-service
          uri: lb://community-service
          predicates:
            - Path=/api/community/**,/api/v1/posts/**
          filters:
            - StripPrefix=0
            - TokenRelay
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE

        # Memory Service (Java + Eureka)
        - id: memory-service
          uri: lb://memory-service
          predicates:
            - Path=/api/memories/**
          filters:
            - StripPrefix=0
            - TokenRelay
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE

        # Medical Management Service (placeholder)
        - id: medical-management
          uri: lb://medical-management
          predicates:
            - Path=/api/v1/medical/**
          filters:
            - StripPrefix=0

        # Care Team Service (placeholder)
        - id: care-team
          uri: lb://care-team
          predicates:
            - Path=/api/v1/care-team/**
          filters:
            - StripPrefix=0

        # Community Social Service (placeholder)
        - id: community-social
          uri: lb://community-social
          predicates:
            - Path=/api/v1/community/**
          filters:
            - StripPrefix=0

        # ML Prediction Service (placeholder)
        - id: ml-prediction
          uri: lb://ml-prediction
          predicates:
            - Path=/api/v1/ml/**
          filters:
            - StripPrefix=0

        # Keycloak (proxy to Keycloak for OAuth flows)
        - id: keycloak
          uri: http://hc-keycloak:8080
          predicates:
            - Path=/realms/**, /resources/**
          filters:
            - StripPrefix=0

        # Swagger API Docs routes
        - id: appointments-api-docs
          uri: lb://appointments-service
          predicates:
            - Path=/appointments/v3/api-docs
          filters:
            - RewritePath=/appointments/v3/api-docs,/v3/api-docs
        - id: medication-api-docs
          uri: lb://medication-service
          predicates:
            - Path=/medication/v3/api-docs
          filters:
            - RewritePath=/medication/v3/api-docs,/v3/api-docs
        - id: community-api-docs
          uri: lb://community-service
          predicates:
            - Path=/community/v3/api-docs
          filters:
            - RewritePath=/community/v3/api-docs,/v3/api-docs
        - id: notification-api-docs
          uri: lb://notification-service
          predicates:
            - Path=/notification/v3/api-docs
          filters:
            - RewritePath=/notification/v3/api-docs,/v3/api-docs
        - id: routine-api-docs
          uri: lb://routine-service
          predicates:
            - Path=/routine/v3/api-docs
          filters:
            - RewritePath=/routine/v3/api-docs,/v3/api-docs
        - id: memory-api-docs
          uri: lb://memory-service
          predicates:
            - Path=/memory/v3/api-docs
          filters:
            - RewritePath=/memory/v3/api-docs,/v3/api-docs
        - id: checkin-api-docs
          uri: lb://daily-checkin-service
          predicates:
            - Path=/checkin/v3/api-docs
          filters:
            - RewritePath=/checkin/v3/api-docs,/v3/api-docs
        - id: patient-api-docs
          uri: lb://patient-service
          predicates:
            - Path=/patient/v3/api-docs
          filters:
            - RewritePath=/patient/v3/api-docs,/v3/api-docs

  # OAuth2 Resource Server Configuration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://hc-keycloak:8080/realms/humancare
          jwk-set-uri: http://hc-keycloak:8080/realms/humancare/protocol/openid-connect/certs

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Gateway
        url: /v3/api-docs
      - name: Appointments
        url: /appointments/v3/api-docs
      - name: Medication
        url: /medication/v3/api-docs
      - name: Community
        url: /community/v3/api-docs
      - name: Notification
        url: /notification/v3/api-docs
      - name: Routine
        url: /routine/v3/api-docs
      - name: Memory
        url: /memory/v3/api-docs
      - name: Check-in
        url: /checkin/v3/api-docs
      - name: Patient
        url: /patient/v3/api-docs
    operationsSorter: method
    tagsSorter: alpha

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics,prometheus
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
    prometheus:
      enabled: true

# Logging
logging:
  level:
    com.humancare.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{X-Correlation-ID}] %-5level %logger{36} - %msg%n"

