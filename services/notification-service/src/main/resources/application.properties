# Bootstrap Configuration
spring.application.name=notification-service
server.port=8088

# Config Server (local development default)
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.fail-fast=false

# Eureka Client (bootstrap - will be overridden by config server)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

---
# Docker Profile
spring.config.activate.on-profile=docker

# Config Server for Docker
spring.config.import=optional:configserver:http://config:config123@hc-config-server:8888

# Eureka for Docker
eureka.client.service-url.defaultZone=http://hc-eureka-server:8761/eureka/
