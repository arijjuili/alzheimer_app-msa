services:
  mysql:
    image: mysql:8.3
    container_name: hc-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: community_db
      MYSQL_USER: hc
      MYSQL_PASSWORD: hcpass
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
