server:
  port: 8083

spring:
  application:
    name: medication-service
  
  # H2 Database (embedded - no installation needed)
  datasource:
    url: jdbc:h2:mem:medication_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  
  # H2 Console (access at http://localhost:8083/h2-console)
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # Disable Flyway for H2
  flyway:
    enabled: false

# Logging Configuration
logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    medication.medication: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
